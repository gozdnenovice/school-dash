<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Šolski Dashboard · Urnik, Naloge, Ocene, Delovni zvezki</title>
    <!-- Font Awesome, Google Fonts, Chart.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #1e293b;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .card, body.dark .login-card, body.dark .nav-tab {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark input, body.dark select, body.dark textarea {
            background: #0f172a;
            color: #e2e8f0;
            border-color: #475569;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .login-card {
            max-width: 450px; margin: 80px auto; background: white;
            border-radius: 32px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #e2e9f2;
        }
        h2, h3 { margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        input, select, button, textarea {
            width: 100%; padding: 14px 18px; margin: 10px 0; border-radius: 40px;
            border: 1px solid #cddae9; font-family: inherit; font-size: 1rem;
        }
        button {
            background: #1e4a7a; color: white; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #0f3b5e; }
        .btn-outline {
            background: transparent; border: 1px solid #1e4a7a; color: #1e4a7a;
        }
        body.dark .btn-outline { color: #90cdf4; border-color: #90cdf4; }
        
        .top-bar {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
            background: white; padding: 16px 24px; border-radius: 28px;
            border: 1px solid #e9eef4; margin-bottom: 20px;
        }
        #digitalClock {
            font-size: 2rem; font-weight: 600; background: #f0f4fe;
            padding: 6px 20px; border-radius: 40px; color: #0f3b5e;
        }
        body.dark #digitalClock { background: #2d3a5e; color: #e0f2fe; }
        .weather-widget { display: flex; align-items: center; gap: 10px; }
        
        .nav-tabs {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .nav-tab {
            background: white; border: 1px solid #e2e9f2; padding: 12px 20px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-tab.active { background: #1e4a7a; color: white; border-color: #1e4a7a; }
        
        .main-panel {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;
        }
        .card {
            background: white; border-radius: 28px; padding: 22px;
            border: 1px solid #e2e9f2; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        
        .progress-bar-container {
            background: #e2e8f0; height: 10px; border-radius: 10px; margin: 10px 0;
        }
        .progress-fill {
            height: 10px; border-radius: 10px; background: #1e4a7a; width: 0%;
        }
        .timer-display { font-size: 3rem; font-weight: 700; text-align: center; margin: 15px 0; }
        
        .hidden { display: none !important; }
        
        .homework-form {
            background: #f9fbfd; padding: 20px; border-radius: 24px; margin-top: 20px;
        }
        body.dark .homework-form { background: #1e293b; }
        
        .triad-option {
            padding: 12px; margin: 8px 0; border: 1px solid #cddae9; border-radius: 40px;
            cursor: pointer; text-align: center; transition: 0.2s;
        }
        .triad-option:hover { background: #e6edf8; }
        
        .homework-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #e2e8f0;
        }
        .homework-completed {
            opacity: 0.6; text-decoration: line-through;
        }
        .homework-actions {
            display: flex; gap: 8px;
        }
        .btn-icon {
            background: none; border: none; color: inherit; cursor: pointer;
            padding: 6px; font-size: 1.1rem; width: auto; margin: 0;
        }
        .btn-icon:hover { color: #1e4a7a; }
    </style>
</head>
<body>
<div class="container">
    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="login-card">
        <h2><i class="fas fa-school"></i> Šolski Dashboard</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Uporabniško ime" required>
            <input type="password" id="loginPassword" placeholder="Geslo" required>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Prijava</button>
        </form>
        <p id="loginError" style="color:red; margin-top:15px;"></p>
        <button class="btn-outline" id="dashboardModeBtn" style="margin-top:15px;">
            <i class="fas fa-chalkboard"></i> Dashboard Mode (brez prijave)
        </button>
        <div id="triadSelection" class="hidden">
            <h3>Izberite triado:</h3>
            <div class="triad-option" data-triad="1">1. triada (1. - 3. razred)</div>
            <div class="triad-option" data-triad="2">2. triada (4. - 6. razred)</div>
            <div class="triad-option" data-triad="3">3. triada (7. - 9. razred)</div>
            <button class="btn-outline" id="backToLoginBtn">Nazaj na prijavo</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardPanel" class="hidden">
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
                <div id="digitalClock">--:--:--</div>
                <div class="weather-widget">
                    <i class="fas fa-cloud-sun" id="weatherIcon"></i>
                    <span><span id="weatherTemp">--°</span> <span id="weatherDesc">--</span></span>
                </div>
            </div>
            <div>
                <span id="loggedInUser" style="margin-right:15px; font-weight:500;"></span>
                <button class="btn-outline" id="darkModeToggle"><i class="fas fa-moon"></i></button>
                <button class="btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Odjava</button>
            </div>
        </div>

        <div class="nav-tabs" id="navTabs"></div>
        <div id="mainContent" class="main-panel"></div>
    </div>
</div>

<script type="module">
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCdUczzayV6O5qyWbQhIvKdsqLgypgjRHM",
        authDomain: "schooldash-e8c6c.firebaseapp.com",
        projectId: "schooldash-e8c6c",
        storageBucket: "schooldash-e8c6c.firebasestorage.app",
        messagingSenderId: "758782018828",
        appId: "1:758782018828:web:0d319b01389e04422cf529"
    };
    const WEATHER_KEY = "b313e62a85a25c88af75861809c6c711";

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, getDocs, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ========== GLOBAL STATE ==========
    let currentUser = null;
    let publicMode = { active: false, triad: null };
    let currentTab = 'dashboard';
    let darkMode = localStorage.getItem('darkMode') === 'true';
    let subjectsCache = [];

    const loginPanel = document.getElementById('loginPanel');
    const dashboardPanel = document.getElementById('dashboardPanel');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const navTabs = document.getElementById('navTabs');
    const mainContent = document.getElementById('mainContent');
    const loggedInUserSpan = document.getElementById('loggedInUser');
    const darkToggle = document.getElementById('darkModeToggle');
    const logoutBtn = document.getElementById('logoutBtn');
    const digitalClock = document.getElementById('digitalClock');
    const dashboardModeBtn = document.getElementById('dashboardModeBtn');
    const triadSelection = document.getElementById('triadSelection');
    const backToLoginBtn = document.getElementById('backToLoginBtn');

    if (darkMode) document.body.classList.add('dark');
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        darkMode = document.body.classList.contains('dark');
        localStorage.setItem('darkMode', darkMode);
    });

    function updateClock() {
        const d = new Date();
        digitalClock.textContent = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
    }
    setInterval(updateClock, 1000); updateClock();

    async function fetchWeather() {
        try {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&units=metric&appid=${WEATHER_KEY}`;
                    const r = await fetch(url); const d = await r.json();
                    if (d.main) {
                        document.getElementById('weatherTemp').innerText = `${Math.round(d.main.temp)}°`;
                        document.getElementById('weatherDesc').innerText = d.weather[0].description;
                    }
                }, () => fallbackWeather());
            } else fallbackWeather();
        } catch { fallbackWeather(); }
    }
    function fallbackWeather() {
        document.getElementById('weatherTemp').innerText = '18°';
        document.getElementById('weatherDesc').innerText = 'Oblačno';
    }
    fetchWeather();

    async function initializeAdmin() {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("username", "==", "Nik"));
        const snap = await getDocs(q);
        if (snap.empty) {
            await addDoc(usersRef, { username: "Nik", password: "123456", role: "admin", createdAt: serverTimestamp() });
            console.log("Admin ustvarjen: Nik / 123456");
        }
        const subjectsSnap = await getDocs(collection(db, "subjects"));
        if (subjectsSnap.empty) {
            await addDoc(collection(db, "subjects"), { name: "Slovenščina" });
            await addDoc(collection(db, "subjects"), { name: "Matematika" });
            await addDoc(collection(db, "subjects"), { name: "Angleščina" });
            await addDoc(collection(db, "subjects"), { name: "Fizika" });
        }
    }
    initializeAdmin();

    async function loadSubjectsCache() {
        const snap = await getDocs(collection(db, "subjects"));
        subjectsCache = snap.docs.map(d => ({ id: d.id, name: d.data().name }));
    }

    function getClassRangeFromTriad(triad) {
        if (triad === 1) return [1,2,3];
        if (triad === 2) return [4,5,6];
        return [7,8,9];
    }

    // Dashboard mode
    dashboardModeBtn.addEventListener('click', () => {
        document.querySelector('#loginPanel form').classList.add('hidden');
        dashboardModeBtn.classList.add('hidden');
        triadSelection.classList.remove('hidden');
    });
    backToLoginBtn.addEventListener('click', () => {
        document.querySelector('#loginPanel form').classList.remove('hidden');
        dashboardModeBtn.classList.remove('hidden');
        triadSelection.classList.add('hidden');
    });
    document.querySelectorAll('.triad-option').forEach(opt => {
        opt.addEventListener('click', () => {
            const triad = parseInt(opt.dataset.triad);
            publicMode = { active: true, triad };
            currentUser = null;
            showPublicDashboard();
        });
    });

    function showPublicDashboard() {
        loginPanel.classList.add('hidden');
        dashboardPanel.classList.remove('hidden');
        const triadNames = ['', '1. triada (1.-3. r)', '2. triada (4.-6. r)', '3. triada (7.-9. r)'];
        loggedInUserSpan.innerHTML = `<i class="fas fa-chalkboard"></i> ${triadNames[publicMode.triad]}`;
        renderPublicNavigation();
        renderTabContent('dashboard');
    }

    function renderPublicNavigation() {
        const tabs = [
            { id: 'dashboard', icon: 'fa-home', label: 'Domov' },
            { id: 'schedule', icon: 'fa-calendar-alt', label: 'Urnik' },
            { id: 'homework', icon: 'fa-tasks', label: 'Naloge' }
        ];
        navTabs.innerHTML = tabs.map(t => `
            <div class="nav-tab ${t.id === 'dashboard' ? 'active' : ''}" data-tab="${t.id}">
                <i class="fas ${t.icon}"></i> ${t.label}
            </div>
        `).join('');
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderTabContent(currentTab);
            });
        });
    }

    // ========== AUTH ==========
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            const q = query(collection(db, "users"), where("username", "==", username), where("password", "==", password));
            const snap = await getDocs(q);
            if (snap.empty) { loginError.textContent = "Napačno uporabniško ime ali geslo."; return; }
            const userDoc = snap.docs[0];
            const userData = userDoc.data();
            currentUser = { docId: userDoc.id, username: userData.username, role: userData.role, class: userData.class || null };
            if (userData.role === 'teacher') {
                const assignSnap = await getDocs(query(collection(db, "teacher_assignments"), where("teacherId", "==", userDoc.id)));
                currentUser.assignments = assignSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            localStorage.setItem('schoolDashUser', JSON.stringify(currentUser));
            publicMode.active = false;
            await loadSubjectsCache();
            showDashboard();
        } catch (err) { loginError.textContent = "Napaka pri prijavi: " + err.message; }
    });

    function showDashboard() {
        loginPanel.classList.add('hidden');
        dashboardPanel.classList.remove('hidden');
        loggedInUserSpan.innerHTML = `<i class="fas fa-user"></i> ${currentUser.username} (${currentUser.role})`;
        renderNavigation();
        renderTabContent('dashboard');
    }

    function renderNavigation() {
        const role = currentUser.role;
        let tabs = [
            { id: 'dashboard', icon: 'fa-home', label: 'Domov' },
            { id: 'schedule', icon: 'fa-calendar-alt', label: 'Urnik' }
        ];
        if (role === 'student' || role === 'teacher') {
            tabs.push({ id: 'homework', icon: 'fa-tasks', label: 'Naloge' });
            tabs.push({ id: 'workbooks', icon: 'fa-book', label: 'Delovni zvezki' });
            tabs.push({ id: 'grades', icon: 'fa-chart-line', label: 'Ocene' });
        }
        if (role === 'teacher' || role === 'admin') {
            tabs.push({ id: 'manage', icon: 'fa-users-cog', label: 'Upravljanje' });
        }
        tabs.push({ id: 'calendar', icon: 'fa-calendar-check', label: 'Koledar' });

        navTabs.innerHTML = tabs.map(t => `
            <div class="nav-tab ${t.id === 'dashboard' ? 'active' : ''}" data-tab="${t.id}">
                <i class="fas ${t.icon}"></i> ${t.label}
            </div>
        `).join('');

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderTabContent(currentTab);
            });
        });
    }

    function renderTabContent(tab) {
        switch (tab) {
            case 'dashboard': renderDashboard(); break;
            case 'schedule': renderSchedule(); break;
            case 'homework': renderHomework(); break;
            case 'workbooks': renderWorkbooks(); break;
            case 'grades': renderGrades(); break;
            case 'calendar': renderCalendar(); break;
            case 'manage': renderManage(); break;
        }
    }

    // ========== DASHBOARD ==========
    function renderDashboard() {
        mainContent.innerHTML = `
            <div class="card">
                <h2>📊 Povzetek</h2>
                <p>Naloge: <span id="dashHomeworkCount">0</span> | Povprečje ocen: <span id="dashAvgGrade">-</span></p>
                <div class="progress-bar-container"><div class="progress-fill" id="dashProgress" style="width:0%"></div></div>
            </div>
            <div class="card">
                <h2>📚 Pending naloge</h2>
                <div id="pendingHomeworkList">Nalaganje...</div>
            </div>
            <div class="card">
                <h2>📈 Graf napredka</h2>
                <canvas id="progressChart"></canvas>
            </div>
        `;
        
        let homeworkQuery;
        if (publicMode.active) {
            const range = getClassRangeFromTriad(publicMode.triad);
            homeworkQuery = query(collection(db, "homework"), where("class", "in", range), where("completed", "==", false));
        } else if (currentUser && currentUser.role === 'student') {
            homeworkQuery = query(collection(db, "homework"), where("class", "==", currentUser.class), where("completed", "==", false));
        } else {
            homeworkQuery = query(collection(db, "homework"), where("completed", "==", false));
        }
        
        onSnapshot(homeworkQuery, snap => {
            document.getElementById('dashHomeworkCount').innerText = snap.size;
            const homeworkList = [];
            snap.forEach(doc => {
                const hw = doc.data();
                homeworkList.push({
                    id: doc.id,
                    ...hw,
                    subjectName: subjectsCache.find(s => s.id === hw.subjectId)?.name || hw.subjectId
                });
            });
            homeworkList.sort((a, b) => {
                if (!a.deadline) return 1;
                if (!b.deadline) return -1;
                return a.deadline.localeCompare(b.deadline);
            });
            const pending = homeworkList.slice(0, 5);
            let html = '';
            if (pending.length === 0) {
                html = '<p>✨ Ni pending nalog.</p>';
            } else {
                pending.forEach(hw => {
                    html += `<div style="margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #e2e8f0;">
                        <strong>${hw.subjectName}</strong> (${hw.class}.r)<br>
                        ${hw.task} ${hw.pages ? `(str. ${hw.pages})` : ''}<br>
                        ${hw.deadline ? `📅 Rok: ${hw.deadline}` : '⏰ Brez roka'}
                    </div>`;
                });
            }
            document.getElementById('pendingHomeworkList').innerHTML = html;
        });
        
        if (!publicMode.active) {
            let gradesQuery = currentUser.role === 'student' ? query(collection(db, "grades"), where("class", "==", currentUser.class)) : collection(db, "grades");
            onSnapshot(gradesQuery, snap => {
                let sum = 0, count = 0;
                snap.forEach(d => { sum += d.data().value; count++; });
                document.getElementById('dashAvgGrade').innerText = count ? (sum/count).toFixed(2) : '-';
            });
        } else {
            document.getElementById('dashAvgGrade').innerText = '-';
        }
        
        const ctx = document.getElementById('progressChart')?.getContext('2d');
        if (ctx) new Chart(ctx, { type: 'line', data: { labels: ['Sep','Okt','Nov'], datasets: [{ label: 'Povprečje', data: [3.5,4.0,4.2] }] } });
    }

    function renderSchedule() {
        mainContent.innerHTML = `<div class="card" style="grid-column:1/-1">
            <h2>📅 Urnik po dnevih</h2><div id="scheduleByDay"></div>
            ${(!publicMode.active && (currentUser.role === 'admin' || currentUser.role === 'teacher')) ? `<button class="btn-outline" id="addPeriodBtn">➕ Dodaj uro</button>` : ''}
        </div>`;
        onSnapshot(collection(db, "schedule"), snap => {
            const days = ['Pon','Tor','Sre','Čet','Pet']; let html = '';
            days.forEach(day => {
                const periods = []; snap.forEach(d => { if (d.data().day === day) periods.push(d.data()); });
                periods.sort((a,b) => a.start.localeCompare(b.start));
                html += `<h3>${day}</h3>` + periods.map(p => `<div>${p.name} (${p.start}-${p.end})</div>`).join('');
            });
            document.getElementById('scheduleByDay').innerHTML = html || 'Ni urnika.';
        });
        if (!publicMode.active && (currentUser.role === 'admin' || currentUser.role === 'teacher')) {
            document.getElementById('addPeriodBtn')?.addEventListener('click', async () => {
                const name = prompt('Predmet:'); const day = prompt('Dan (Pon, Tor, Sre, Čet, Pet):');
                const start = prompt('Začetek (HH:MM):'); const end = prompt('Konec (HH:MM):');
                if (name && day) await addDoc(collection(db, "schedule"), { name, day, start, end });
            });
        }
    }

    // ========== HOMEWORK ==========
    function renderHomework() {
        mainContent.innerHTML = `<div class="card">
            <h2>📚 Domače naloge</h2>
            <div id="homeworkList"></div>
            ${(!publicMode.active && currentUser.role === 'teacher') ? `
                <button class="btn-outline" id="showHomeworkFormBtn">➕ Dodaj nalogo</button>
                <div id="homeworkFormContainer" class="homework-form hidden">
                    <h3>Nova domača naloga</h3>
                    <select id="hwClassSubjectSelect"><option value="">-- Izberite razred in predmet --</option></select>
                    <input type="text" id="hwPages" placeholder="Strani (npr. 45-47)">
                    <label style="display:flex; align-items:center; gap:10px; margin:10px 0;">
                        <input type="checkbox" id="hwCustomCheck" style="width:auto;"> Po meri (dodaten opis)
                    </label>
                    <textarea id="hwCustomDesc" placeholder="Opis naloge po meri ..." rows="3" class="hidden"></textarea>
                    <input type="date" id="hwDeadline" value="">
                    <button class="btn-primary" id="submitHomeworkBtn">Shrani nalogo</button>
                    <button class="btn-outline" id="cancelHomeworkBtn">Prekliči</button>
                </div>
            ` : ''}
        </div>`;

        let homeworkQuery;
        if (publicMode.active) {
            const range = getClassRangeFromTriad(publicMode.triad);
            homeworkQuery = query(collection(db, "homework"), where("class", "in", range));
        } else if (currentUser.role === 'student') {
            homeworkQuery = query(collection(db, "homework"), where("class", "==", currentUser.class));
        } else {
            homeworkQuery = collection(db, "homework");
        }
        
        onSnapshot(homeworkQuery, snap => {
            let html = '';
            snap.forEach(d => {
                const h = d.data();
                const subj = subjectsCache.find(s => s.id === h.subjectId)?.name || h.subjectId;
                const isCompleted = h.completed || false;
                html += `<div class="homework-item ${isCompleted ? 'homework-completed' : ''}">
                    <div>
                        <strong>${subj}</strong> (${h.class}.r): ${h.task} ${h.pages ? `(str. ${h.pages})` : ''} 
                        ${h.deadline ? `📅 ${h.deadline}` : ''}
                    </div>
                    <div class="homework-actions">`;
                
                if (!publicMode.active) {
                    if (currentUser.role === 'teacher') {
                        html += `<button class="btn-icon delete-hw" data-id="${d.id}" title="Izbriši nalogo"><i class="fas fa-trash-alt"></i></button>`;
                    } else if (currentUser.role === 'student') {
                        html += `<button class="btn-icon toggle-complete" data-id="${d.id}" data-completed="${isCompleted}" title="${isCompleted ? 'Označi kot neopravljeno' : 'Označi kot opravljeno'}">
                            <i class="fas ${isCompleted ? 'fa-undo-alt' : 'fa-check-circle'}"></i>
                        </button>`;
                    }
                }
                html += `</div></div>`;
            });
            document.getElementById('homeworkList').innerHTML = html || 'Ni nalog.';
            
            document.querySelectorAll('.delete-hw').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.dataset.id;
                    if (confirm('Izbriši nalogo?')) {
                        await deleteDoc(doc(db, "homework", id));
                    }
                });
            });
            document.querySelectorAll('.toggle-complete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.currentTarget.dataset.id;
                    const completed = e.currentTarget.dataset.completed === 'true';
                    await updateDoc(doc(db, "homework", id), { completed: !completed });
                });
            });
        });

        if (!publicMode.active && currentUser.role === 'teacher') {
            const selectEl = document.getElementById('hwClassSubjectSelect');
            if (selectEl && currentUser.assignments) {
                currentUser.assignments.forEach((a, idx) => {
                    const subjName = subjectsCache.find(s => s.id === a.subjectId)?.name || a.subjectId;
                    const option = document.createElement('option');
                    option.value = idx;
                    option.textContent = `${a.class}. razred - ${subjName}`;
                    selectEl.appendChild(option);
                });
            }
            const formContainer = document.getElementById('homeworkFormContainer');
            const showBtn = document.getElementById('showHomeworkFormBtn');
            const cancelBtn = document.getElementById('cancelHomeworkBtn');
            const customCheck = document.getElementById('hwCustomCheck');
            const customDesc = document.getElementById('hwCustomDesc');
            showBtn?.addEventListener('click', () => formContainer.classList.remove('hidden'));
            cancelBtn?.addEventListener('click', () => {
                formContainer.classList.add('hidden');
                document.getElementById('hwPages').value = '';
                customDesc.value = '';
                customCheck.checked = false;
                customDesc.classList.add('hidden');
            });
            customCheck?.addEventListener('change', () => customDesc.classList.toggle('hidden', !customCheck.checked));
            document.getElementById('submitHomeworkBtn')?.addEventListener('click', async () => {
                const select = document.getElementById('hwClassSubjectSelect');
                if (!select.value) return alert('Izberite razred in predmet.');
                const assign = currentUser.assignments[parseInt(select.value)];
                const pages = document.getElementById('hwPages').value.trim();
                const deadline = document.getElementById('hwDeadline').value;
                let taskDescription = '';
                if (customCheck.checked) {
                    taskDescription = customDesc.value.trim();
                    if (!taskDescription) return alert('Vpišite opis naloge po meri.');
                } else {
                    taskDescription = pages ? `Naloga iz delovnega zvezka, str. ${pages}` : 'Naloga (brez podrobnosti)';
                }
                await addDoc(collection(db, "homework"), {
                    subjectId: assign.subjectId, class: assign.class, teacherId: currentUser.docId,
                    task: taskDescription, pages: pages || null, deadline: deadline || null,
                    completed: false, createdAt: serverTimestamp()
                });
                formContainer.classList.add('hidden');
            });
        }
    }

    // Ostale funkcije
    function renderWorkbooks() {
        if (publicMode.active) return;
        mainContent.innerHTML = `<div class="card"><h2>📘 Delovni zvezki</h2><p>Funkcija na voljo samo prijavljenim.</p></div>`;
    }
    function renderGrades() {
        if (publicMode.active) return;
        mainContent.innerHTML = `<div class="card"><h2>📊 Ocene</h2><p>Funkcija na voljo samo prijavljenim.</p></div>`;
    }
    function renderCalendar() {
        mainContent.innerHTML = `<div class="card"><h2>📅 Dogodki</h2><p>Koledar dogodkov.</p></div>`;
    }
    function renderManage() {
        if (publicMode.active) return;
        mainContent.innerHTML = `<div class="card"><h2>👥 Upravljanje</h2><p>Samo za admin/teacher.</p></div>`;
    }

    logoutBtn.onclick = () => {
        if (publicMode.active) {
            publicMode = { active: false, triad: null };
            dashboardPanel.classList.add('hidden');
            loginPanel.classList.remove('hidden');
            document.querySelector('#loginPanel form').classList.remove('hidden');
            dashboardModeBtn.classList.remove('hidden');
            triadSelection.classList.add('hidden');
            loginForm.reset();
        } else {
            localStorage.removeItem('schoolDashUser');
            currentUser = null;
            dashboardPanel.classList.add('hidden');
            loginPanel.classList.remove('hidden');
            loginForm.reset();
        }
    };

    const saved = localStorage.getItem('schoolDashUser');
    if (saved) {
        currentUser = JSON.parse(saved);
        publicMode.active = false;
        loadSubjectsCache().then(() => showDashboard());
    }
</script>
</body>
</html>
