<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Šolski Dashboard · Urnik, Naloge, Ocene</title>
    <!-- Font Awesome, Google Fonts, Chart.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            padding: 20px;
            color: #1e293b;
            transition: background 0.3s, color 0.3s;
        }
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .card, body.dark .login-card, body.dark .nav-tab {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark input, body.dark select, body.dark textarea {
            background: #0f172a;
            color: #e2e8f0;
            border-color: #475569;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Login */
        .login-card {
            max-width: 450px; margin: 80px auto; background: white;
            border-radius: 32px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #e2e9f2;
        }
        h2 { margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        input, select, button, textarea {
            width: 100%; padding: 14px 18px; margin: 10px 0; border-radius: 40px;
            border: 1px solid #cddae9; font-family: inherit; font-size: 1rem;
        }
        button {
            background: #1e4a7a; color: white; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #0f3b5e; }
        .btn-outline {
            background: transparent; border: 1px solid #1e4a7a; color: #1e4a7a;
        }
        body.dark .btn-outline { color: #90cdf4; border-color: #90cdf4; }
        
        /* Dashboard layout */
        .top-bar {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
            background: white; padding: 16px 24px; border-radius: 28px;
            border: 1px solid #e9eef4; margin-bottom: 20px;
        }
        #digitalClock {
            font-size: 2rem; font-weight: 600; background: #f0f4fe;
            padding: 6px 20px; border-radius: 40px; color: #0f3b5e;
        }
        body.dark #digitalClock { background: #2d3a5e; color: #e0f2fe; }
        .weather-widget { display: flex; align-items: center; gap: 10px; }
        
        .nav-tabs {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .nav-tab {
            background: white; border: 1px solid #e2e9f2; padding: 12px 20px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-tab.active { background: #1e4a7a; color: white; border-color: #1e4a7a; }
        
        .main-panel {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px;
        }
        .card {
            background: white; border-radius: 28px; padding: 22px;
            border: 1px solid #e2e9f2; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-3px); }
        
        .progress-bar-container {
            background: #e2e8f0; height: 10px; border-radius: 10px; margin: 10px 0;
        }
        .progress-fill {
            height: 10px; border-radius: 10px; background: #1e4a7a; width: 0%;
        }
        .timer-display { font-size: 3rem; font-weight: 700; text-align: center; margin: 15px 0; }
        
        .hidden { display: none !important; }
        .ai-response { background: #f0f4fe; padding: 16px; border-radius: 20px; margin-top: 15px; }
        body.dark .ai-response { background: #2d3a5e; }
    </style>
</head>
<body>
<div class="container">
    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="login-card">
        <h2><i class="fas fa-school"></i> Šolski Dashboard</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Uporabniško ime" required>
            <input type="password" id="loginPassword" placeholder="Geslo" required>
            <button type="submit"><i class="fas fa-sign-in-alt"></i> Prijava</button>
        </form>
        <p id="loginError" style="color:red; margin-top:15px;"></p>
        <!-- Odstranjena vrstica z admin geslom -->
    </div>

    <!-- MAIN DASHBOARD (hidden until login) -->
    <div id="dashboardPanel" class="hidden">
        <!-- Top bar -->
        <div class="top-bar">
            <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
                <div id="digitalClock">--:--:--</div>
                <div class="weather-widget">
                    <i class="fas fa-cloud-sun" id="weatherIcon"></i>
                    <span><span id="weatherTemp">--°</span> <span id="weatherDesc">--</span></span>
                </div>
            </div>
            <div>
                <span id="loggedInUser" style="margin-right:15px; font-weight:500;"></span>
                <button class="btn-outline" id="darkModeToggle"><i class="fas fa-moon"></i></button>
                <button class="btn-outline" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Odjava</button>
            </div>
        </div>

        <!-- Navigation tabs (dynamic based on role) -->
        <div class="nav-tabs" id="navTabs"></div>

        <!-- Dynamic content area -->
        <div id="mainContent" class="main-panel"></div>
    </div>
</div>

<script type="module">
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCdUczzayV6O5qyWbQhIvKdsqLgypgjRHM",
        authDomain: "schooldash-e8c6c.firebaseapp.com",
        projectId: "schooldash-e8c6c",
        storageBucket: "schooldash-e8c6c.firebasestorage.app",
        messagingSenderId: "758782018828",
        appId: "1:758782018828:web:0d319b01389e04422cf529"
    };
    const WEATHER_KEY = "b313e62a85a25c88af75861809c6c711";

    // Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ========== GLOBAL STATE ==========
    let currentUser = null; // { username, role, docId }
    let currentTab = 'dashboard';
    let darkMode = localStorage.getItem('darkMode') === 'true';

    // DOM elements
    const loginPanel = document.getElementById('loginPanel');
    const dashboardPanel = document.getElementById('dashboardPanel');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const navTabs = document.getElementById('navTabs');
    const mainContent = document.getElementById('mainContent');
    const loggedInUserSpan = document.getElementById('loggedInUser');
    const darkToggle = document.getElementById('darkModeToggle');
    const logoutBtn = document.getElementById('logoutBtn');
    const digitalClock = document.getElementById('digitalClock');

    // Apply dark mode
    if (darkMode) document.body.classList.add('dark');
    darkToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        darkMode = document.body.classList.contains('dark');
        localStorage.setItem('darkMode', darkMode);
    });

    // Clock
    function updateClock() {
        const d = new Date();
        digitalClock.textContent = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
    }
    setInterval(updateClock, 1000); updateClock();

    // Weather
    async function fetchWeather() {
        try {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async pos => {
                    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&units=metric&appid=${WEATHER_KEY}`;
                    const r = await fetch(url); const d = await r.json();
                    if (d.main) {
                        document.getElementById('weatherTemp').innerText = `${Math.round(d.main.temp)}°`;
                        document.getElementById('weatherDesc').innerText = d.weather[0].description;
                    }
                }, () => fallbackWeather());
            } else fallbackWeather();
        } catch { fallbackWeather(); }
    }
    function fallbackWeather() {
        document.getElementById('weatherTemp').innerText = '18°';
        document.getElementById('weatherDesc').innerText = 'Oblačno';
    }
    fetchWeather();

    // ========== AUTH (Firestore based) ==========
    async function initializeAdmin() {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("username", "==", "Nik"));
        const snap = await getDocs(q);
        if (snap.empty) {
            await addDoc(usersRef, {
                username: "Nik",
                password: "123456", // v praksi hashiraj!
                role: "admin",
                createdAt: serverTimestamp()
            });
            console.log("Admin ustvarjen: Nik / 123456");
        }
    }
    initializeAdmin();

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        try {
            const q = query(collection(db, "users"), where("username", "==", username), where("password", "==", password));
            const snap = await getDocs(q);
            if (snap.empty) {
                loginError.textContent = "Napačno uporabniško ime ali geslo.";
                return;
            }
            const userDoc = snap.docs[0];
            currentUser = {
                docId: userDoc.id,
                username: userDoc.data().username,
                role: userDoc.data().role
            };
            localStorage.setItem('schoolDashUser', JSON.stringify(currentUser));
            showDashboard();
        } catch (err) {
            loginError.textContent = "Napaka pri prijavi: " + err.message;
        }
    });

    function showDashboard() {
        loginPanel.classList.add('hidden');
        dashboardPanel.classList.remove('hidden');
        loggedInUserSpan.innerHTML = `<i class="fas fa-user"></i> ${currentUser.username} (${currentUser.role})`;
        renderNavigation();
        renderTabContent('dashboard');
    }

    function renderNavigation() {
        const role = currentUser.role;
        let tabs = [
            { id: 'dashboard', icon: 'fa-home', label: 'Domov' },
            { id: 'schedule', icon: 'fa-calendar-alt', label: 'Urnik' }
        ];
        if (role === 'student' || role === 'teacher') {
            tabs.push({ id: 'homework', icon: 'fa-tasks', label: 'Naloge' });
            tabs.push({ id: 'grades', icon: 'fa-chart-line', label: 'Ocene' });
        }
        if (role === 'teacher' || role === 'admin') {
            tabs.push({ id: 'manage', icon: 'fa-users-cog', label: 'Upravljanje' });
        }
        tabs.push({ id: 'calendar', icon: 'fa-calendar-check', label: 'Koledar' });
        tabs.push({ id: 'pomodoro', icon: 'fa-hourglass-half', label: 'Pomodoro' });
        // AI tab for all
        tabs.push({ id: 'ai', icon: 'fa-robot', label: 'AI Pomočnik' });

        navTabs.innerHTML = tabs.map(t => `
            <div class="nav-tab ${t.id === 'dashboard' ? 'active' : ''}" data-tab="${t.id}">
                <i class="fas ${t.icon}"></i> ${t.label}
            </div>
        `).join('');

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderTabContent(currentTab);
            });
        });
    }

    function renderTabContent(tab) {
        switch (tab) {
            case 'dashboard': renderDashboard(); break;
            case 'schedule': renderSchedule(); break;
            case 'homework': renderHomework(); break;
            case 'grades': renderGrades(); break;
            case 'calendar': renderCalendar(); break;
            case 'pomodoro': renderPomodoro(); break;
            case 'manage': renderManage(); break;
            case 'ai': renderAI(); break;
        }
    }

    // ========== DASHBOARD ==========
    function renderDashboard() {
        mainContent.innerHTML = `
            <div class="card"><h2>📊 Povzetek</h2>
                <p>Naloge: <span id="dashHomeworkCount">0</span> | Povprečje ocen: <span id="dashAvgGrade">-</span></p>
                <div class="progress-bar-container"><div class="progress-fill" id="dashProgress" style="width:0%"></div></div>
            </div>
            <div class="card"><h2>⏰ Naslednji dogodek</h2><div id="nextEventWidget">Nalaganje...</div></div>
            <div class="card"><h2>📈 Graf napredka</h2><canvas id="progressChart"></canvas></div>
        `;
        // Load data
        onSnapshot(collection(db, "homework"), snap => {
            document.getElementById('dashHomeworkCount').innerText = snap.size;
        });
        onSnapshot(collection(db, "grades"), snap => {
            let sum = 0, count = 0;
            snap.forEach(d => { sum += d.data().value; count++; });
            document.getElementById('dashAvgGrade').innerText = count ? (sum/count).toFixed(2) : '-';
        });
        const ctx = document.getElementById('progressChart')?.getContext('2d');
        if (ctx) new Chart(ctx, { type: 'line', data: { labels: ['Sep','Okt','Nov'], datasets: [{ label: 'Povprečje', data: [3.5,4.0,4.2] }] } });
    }

    // ========== URNIK ==========
    function renderSchedule() {
        mainContent.innerHTML = `<div class="card" style="grid-column:1/-1">
            <h2>📅 Urnik po dnevih</h2>
            <div id="scheduleByDay"></div>
            ${(currentUser.role === 'admin' || currentUser.role === 'teacher') ? `
                <button class="btn-outline" id="addPeriodBtn" style="margin-top:15px;">➕ Dodaj uro</button>
            ` : ''}
        </div>`;
        loadSchedule();
        if (currentUser.role === 'admin' || currentUser.role === 'teacher') {
            document.getElementById('addPeriodBtn').addEventListener('click', async () => {
                const name = prompt('Predmet:');
                const day = prompt('Dan (Pon, Tor, Sre, Čet, Pet):');
                const start = prompt('Začetek (HH:MM):');
                const end = prompt('Konec (HH:MM):');
                if (name && day) await addDoc(collection(db, "schedule"), { name, day, start, end });
            });
        }
    }
    function loadSchedule() {
        onSnapshot(collection(db, "schedule"), snap => {
            const days = ['Pon','Tor','Sre','Čet','Pet'];
            let html = '';
            days.forEach(day => {
                const periods = []; snap.forEach(d => { if (d.data().day === day) periods.push(d.data()); });
                periods.sort((a,b) => a.start.localeCompare(b.start));
                html += `<h3>${day}</h3>`;
                periods.forEach(p => html += `<div>${p.name} (${p.start}-${p.end})</div>`);
            });
            document.getElementById('scheduleByDay').innerHTML = html || 'Ni urnika.';
        });
    }

    // ========== NALOGE (samo za učitelje vnos) ==========
    function renderHomework() {
        mainContent.innerHTML = `<div class="card">
            <h2>📚 Domače naloge</h2>
            <div id="homeworkList"></div>
            ${currentUser.role === 'teacher' ? `<button class="btn-outline" id="addHomeworkBtn">➕ Dodaj nalogo</button>` : ''}
        </div>`;
        onSnapshot(collection(db, "homework"), snap => {
            let html = '';
            snap.forEach(d => {
                const h = d.data();
                html += `<div><strong>${h.subject}</strong>: ${h.task} (rok: ${h.deadline})</div>`;
            });
            document.getElementById('homeworkList').innerHTML = html || 'Ni nalog.';
        });
        if (currentUser.role === 'teacher') {
            document.getElementById('addHomeworkBtn').addEventListener('click', async () => {
                const subject = prompt('Predmet:');
                const task = prompt('Opis naloge:');
                const deadline = prompt('Rok (YYYY-MM-DD):');
                if (subject && task) await addDoc(collection(db, "homework"), { subject, task, deadline });
            });
        }
    }

    // ========== OCENE (učitelj vpisuje) ==========
    function renderGrades() {
        mainContent.innerHTML = `<div class="card">
            <h2>📊 Ocene</h2>
            <canvas id="gradesChart"></canvas>
            <div id="gradesList"></div>
            ${currentUser.role === 'teacher' ? `<button class="btn-outline" id="addGradeBtn">➕ Dodaj oceno</button>` : ''}
        </div>`;
        onSnapshot(collection(db, "grades"), snap => {
            const subjects = {};
            snap.forEach(d => {
                const g = d.data();
                if (!subjects[g.subject]) subjects[g.subject] = [];
                subjects[g.subject].push(g.value);
            });
            const ctx = document.getElementById('gradesChart').getContext('2d');
            new Chart(ctx, { type: 'bar', data: {
                labels: Object.keys(subjects),
                datasets: [{ label: 'Povprečje', data: Object.values(subjects).map(arr => arr.reduce((a,b)=>a+b,0)/arr.length) }]
            } });
            let listHtml = '';
            snap.forEach(d => { const g = d.data(); listHtml += `<div>${g.subject}: ${g.value} (${g.date || ''})</div>`; });
            document.getElementById('gradesList').innerHTML = listHtml;
        });
        if (currentUser.role === 'teacher') {
            document.getElementById('addGradeBtn').addEventListener('click', async () => {
                const subject = prompt('Predmet:');
                const value = parseFloat(prompt('Ocena (1-5):'));
                if (subject && value) await addDoc(collection(db, "grades"), { subject, value, date: new Date().toISOString().split('T')[0] });
            });
        }
    }

    // ========== KOLEDAR ==========
    function renderCalendar() {
        mainContent.innerHTML = `<div class="card">
            <h2>📅 Dogodki</h2>
            <div id="eventsList"></div>
            <button class="btn-outline" id="addEventBtn">➕ Dodaj dogodek</button>
        </div>`;
        onSnapshot(collection(db, "events"), snap => {
            let html = '';
            snap.forEach(d => { const e = d.data(); html += `<div>${e.date}: ${e.title}</div>`; });
            document.getElementById('eventsList').innerHTML = html || 'Ni dogodkov.';
        });
        document.getElementById('addEventBtn').addEventListener('click', async () => {
            const title = prompt('Naslov:');
            const date = prompt('Datum (YYYY-MM-DD):');
            if (title) await addDoc(collection(db, "events"), { title, date });
        });
    }

    // ========== POMODORO ==========
    function renderPomodoro() {
        mainContent.innerHTML = `<div class="card">
            <h2>⏳ Pomodoro Timer</h2>
            <div class="timer-display" id="pomodoroDisplay">25:00</div>
            <button id="pomodoroStart" class="btn-outline">Začni</button>
            <button id="pomodoroReset" class="btn-outline">Reset</button>
            <p>🍅 Dokončane seje: <span id="pomodoroCount">0</span></p>
        </div>`;
        let time = 25*60, active = false, interval, count = 0;
        const disp = document.getElementById('pomodoroDisplay');
        function update() { const m = Math.floor(time/60), s = time%60; disp.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        document.getElementById('pomodoroStart').onclick = () => {
            if (!active) {
                active = true;
                interval = setInterval(() => {
                    if (time > 0) { time--; update(); }
                    else { clearInterval(interval); active = false; count++; document.getElementById('pomodoroCount').innerText = count; }
                }, 1000);
            } else { clearInterval(interval); active = false; }
        };
        document.getElementById('pomodoroReset').onclick = () => { time = 25*60; update(); };
    }

    // ========== UPRAVLJANJE UPORABNIKOV (Admin / Teacher) ==========
    function renderManage() {
        mainContent.innerHTML = `<div class="card" style="grid-column:1/-1">
            <h2>👥 Upravljanje uporabnikov</h2>
            <div id="usersList"></div>
            <h3 style="margin-top:20px;">Dodaj novega uporabnika</h3>
            <input type="text" id="newUsername" placeholder="Uporabniško ime">
            <input type="password" id="newPassword" placeholder="Geslo">
            <select id="newRole"><option value="student">Učenec</option><option value="teacher">Učitelj</option><option value="admin">Admin</option></select>
            <button id="addUserBtn">Dodaj</button>
            <h3 style="margin-top:20px;">Spremeni geslo</h3>
            <input type="text" id="changeUsername" placeholder="Uporabniško ime">
            <input type="password" id="changePassword" placeholder="Novo geslo">
            <button id="changePasswordBtn">Spremeni</button>
        </div>`;
        loadUsers();
        document.getElementById('addUserBtn').addEventListener('click', async () => {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            if (!username || !password) return alert('Vnesi uporabniško ime in geslo');
            await addDoc(collection(db, "users"), { username, password, role });
            loadUsers();
        });
        document.getElementById('changePasswordBtn').addEventListener('click', async () => {
            const username = document.getElementById('changeUsername').value.trim();
            const newPass = document.getElementById('changePassword').value;
            if (!username || !newPass) return;
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if (!snap.empty) {
                await updateDoc(doc(db, "users", snap.docs[0].id), { password: newPass });
                alert('Geslo spremenjeno');
            } else alert('Uporabnik ne obstaja');
        });
    }
    async function loadUsers() {
        const snap = await getDocs(collection(db, "users"));
        let html = '';
        snap.forEach(d => {
            const u = d.data();
            html += `<div>${u.username} (${u.role}) 
                ${currentUser.role === 'admin' ? `<button data-id="${d.id}" class="deleteUserBtn">❌</button>` : ''}
            </div>`;
        });
        document.getElementById('usersList').innerHTML = html;
        document.querySelectorAll('.deleteUserBtn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (confirm('Izbriši uporabnika?')) {
                    await deleteDoc(doc(db, "users", e.target.dataset.id));
                    loadUsers();
                }
            });
        });
    }

    // ========== AI (placeholder) ==========
    function renderAI() {
        mainContent.innerHTML = `<div class="card">
            <h2>🤖 AI Pomočnik</h2>
            <textarea id="aiQuestion" rows="3" placeholder="Vprašaj karkoli ..."></textarea>
            <button id="askAI" class="btn-outline">Vprašaj</button>
            <div id="aiResponse" class="ai-response">AI odgovor bo tukaj (trenutno onemogočen).</div>
        </div>`;
        document.getElementById('askAI').addEventListener('click', () => {
            document.getElementById('aiResponse').innerText = 'AI funkcionalnost bo dodana kasneje.';
        });
    }

    // Logout
    logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('schoolDashUser');
        currentUser = null;
        dashboardPanel.classList.add('hidden');
        loginPanel.classList.remove('hidden');
        document.getElementById('loginForm').reset();
    });

    // Check for saved session
    const savedUser = localStorage.getItem('schoolDashUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        showDashboard();
    }
</script>
</body>
</html>
